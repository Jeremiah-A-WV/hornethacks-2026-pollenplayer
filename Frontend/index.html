<!DOCTYPE html>
<html>

<head>
    <title>Pollen Player </title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="images/flowerlogo.png">
</head>.

<body>

    <h1 class="center">Pollen______Player
        <img src="images/flowerlogo.png" id="flowerlogo" alt="flowerlogo">
    </h1>


    <br><br>


    <div>
        <p class="center" id="greeting">
            Where are you? Click to enable location or enter your zipcode.
        </p>



        <label for="geoBtn">Location: </label>
        <input class="button" type="submit" id="geoBtn" value="Find Me"><br><br>

        <!-- input and submit button for zipcode -->

        <label for="zipCode">Zipcode: </label>
        <input type="text" id="zipCode" name="Zipcode">
        <input class="button" id="zipBtn" type="submit" for="zipCode" value="Submit">

    </div>

    <div style="margin-top: 20px;">
        <h3 id="atmosphereDisplay"></h3>
        <div id="videoContainer"></div>
    </div>


    <footer>
        <br><br><br>
        <button class="button" id="darkModeButton">Toggle Dark Mode</button>
    </footer>

    <script src="script.js"></script>
</body>

</html>

<!DOCTYPE html>
<html>
    <head>
        <title>Pollen Player </title>
        <link rel="stylesheet" href="Home.css">
    </head>. 

    <body>
        
        <h1 class="center">Pollen______Player
            <img src="flowerlogo.png" alt="flowerlogo">
        </h1> 


        <br><br>
        
       
        <form>
        <p class="center">
            Where are you? Click to enable location or enter your zipcode. 
        </p>

        
        
        <label for= "Location">Location: </label>
        <input class="button"  type="submit" id="Location" value="Enable"><br><br>

        <!-- input and submit button for zipcode -->
        
            <label for="Zipcode" >Zipcode: </label>
            <input type="text" id="Zipcode" name="Zipcode">
            <input class="button" type="submit" for="Zipcode" value="Submit">

        </form>

        <script>
        function toggle() {
        var body = document.body;
        var heading = document.h1;
        var input = document.input;
        var button = document.button;

        body.classList.toggle("darkMode");
        heading.classList.toggle("darkMode");
        input.classList.toggle("darkMode");
        button.classList.toggle("darkMode");
        }
</script>
         

    </body>

    <footer>
        <br><br><br>
        <button class="button" onclick="toggle()">Toggle Dark Mode</button>
    </footer>








</html>
